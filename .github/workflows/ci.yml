name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: takehome
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/takehome

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Run migrations
        run: bun run db:migrate

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      # Tests fail by design on the template repo because the API routes are
      # 501 stubs awaiting candidate implementation. Candidates' forks run the
      # full suite — only the template itself is skipped.
      - name: Run tests
        if: ${{ github.repository != 'blencorp/blen-fullstack-engineer-i-take-home' }}
        run: bun run test
